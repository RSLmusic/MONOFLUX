<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MonoFlux</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }

    .chassis {
      position: relative;
      width: 1400px; height: 820px;
      flex-shrink: 0;
      background: url('assets/chassis-cropped.png') center center / cover no-repeat;
    }

    /* ── Reactor ── */
    .reactor {
      position: absolute;
      left: 553px; top: 217px;
      width: 200px; height: 200px;
      border-radius: 50%;
      overflow: hidden;
      z-index: 10;
      box-shadow:
        0 0 0 1px rgba(255,110,20,.15),
        0 0 22px rgba(255,90,10,.12),
        0 0 55px rgba(255,70,0,.06);
    }
    .reactor video {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center center;
    }
    .reactor::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle, transparent 50%, rgba(0,0,0,.28) 78%, rgba(0,0,0,.58) 100%);
      pointer-events: none; z-index: 2;
    }

    /* ── Knob image ── */
    .ki {
      position: absolute;
      width: 72px;
      height: 78px;
      transform: translate(-50%, -50%);
      user-select: none;
      pointer-events: none;
      image-rendering: auto;
    }

    /* ── Arc knob wrapper ── */
    .arc-wrap {
      position: absolute;
      width: 88px; height: 92px;
      transform: translate(-50%, -50%);
      user-select: none;
      cursor: ns-resize;
    }
    .arc-svg {
      position: absolute; top: 0; left: 0;
      width: 88px; height: 88px;
      pointer-events: none;
      z-index: 2;
    }
    .arc-img {
      position: absolute;
      width: 72px; height: 78px;
      top: 7px; left: 8px;
      will-change: transform;
    }
  </style>
</head>
<body>
<div class="chassis">

  <!-- ── Reactor ── -->
  <div class="reactor">
    <video id="rv" autoplay loop muted playsinline preload="auto">
      <source src="assets/reactor-fire.webm" type="video/webm">
      <source src="assets/reactor.mp4"       type="video/mp4">
    </video>
  </div>

  <!-- ══ LEFT UPPER BAY — 2×2 ══ -->
  <img class="ki" src="assets/knob.png" style="left:170px;top:165px">
  <img class="ki" src="assets/knob.png" style="left:254px;top:165px">
  <img class="ki" src="assets/knob.png" style="left:170px;top:249px">
  <img class="ki" src="assets/knob.png" style="left:254px;top:249px">

  <!-- ══ LEFT LOWER BAY — 2×2 ══ -->
  <img class="ki" src="assets/knob.png" style="left:170px;top:513px">
  <img class="ki" src="assets/knob.png" style="left:254px;top:513px">
  <img class="ki" src="assets/knob.png" style="left:170px;top:597px">
  <img class="ki" src="assets/knob.png" style="left:254px;top:597px">

  <!-- ══ RIGHT UPPER BAY — 2×2 ══ -->
  <img class="ki" src="assets/knob.png" style="left:1146px;top:165px">
  <img class="ki" src="assets/knob.png" style="left:1230px;top:165px">
  <img class="ki" src="assets/knob.png" style="left:1146px;top:249px">
  <img class="ki" src="assets/knob.png" style="left:1230px;top:249px">

  <!-- ══ RIGHT LOWER BAY — 2×2 ══ -->
  <img class="ki" src="assets/knob.png" style="left:1146px;top:513px">
  <img class="ki" src="assets/knob.png" style="left:1230px;top:513px">
  <img class="ki" src="assets/knob.png" style="left:1146px;top:597px">
  <img class="ki" src="assets/knob.png" style="left:1230px;top:597px">

  <!-- ══ BOTTOM CENTER BAY — 4 in a row ══ -->
  <!-- K1 -->
  <img class="ki" src="assets/knob.png" style="left:580px;top:649px">

  <!-- K2 — interactive arc knob -->
  <div class="arc-wrap" id="arc-wrap" style="left:660px;top:649px">
    <svg class="arc-svg" viewBox="0 0 88 88">
      <!-- Track: 135°→45° clockwise (270° sweep, open at bottom) -->
      <path id="arc-track"
        d="M 18.58,69.58 A 37,37 0 1,1 69.42,69.58"
        fill="none" stroke="rgba(80,78,74,.5)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- Fill: current value -->
      <path id="arc-fill"
        d="" fill="none" stroke="rgba(185,195,215,.75)" stroke-width="3.5" stroke-linecap="round"/>
    </svg>
    <img class="arc-img" id="arc-face" src="assets/knob.png">
  </div>

  <!-- K3 -->
  <img class="ki" src="assets/knob.png" style="left:740px;top:649px">
  <!-- K4 -->
  <img class="ki" src="assets/knob.png" style="left:820px;top:649px">

</div><!-- .chassis -->

<script>
  /* ── Video autoplay ── */
  const rv = document.getElementById('rv');
  const tryPlay = () => { if (rv.paused) rv.play().catch(() => {}); };
  rv.addEventListener('canplay', tryPlay);
  rv.addEventListener('loadeddata', tryPlay);
  tryPlay();

  /* ── Arc knob ── */
  const face = document.getElementById('arc-face');
  const fill = document.getElementById('arc-fill');
  const R = 37, CX = 44, CY = 44;
  const START = 135;

  let dragging = false, y0 = 0, a0 = 0, aCur = 0;

  function setAngle(deg) {
    deg = Math.max(-135, Math.min(135, deg));
    aCur = deg;
    face.style.transform = `rotate(${deg}deg)`;

    const svgCur = 270 + deg;
    const span   = svgCur - START;

    if (span < 0.5) { fill.setAttribute('d', ''); return; }

    const sx = CX + R * Math.cos(START  * Math.PI / 180);
    const sy = CY + R * Math.sin(START  * Math.PI / 180);
    const ex = CX + R * Math.cos(svgCur * Math.PI / 180);
    const ey = CY + R * Math.sin(svgCur * Math.PI / 180);

    fill.setAttribute('d',
      `M ${sx.toFixed(2)},${sy.toFixed(2)} A ${R},${R} 0 ${span > 180 ? 1 : 0},1 ${ex.toFixed(2)},${ey.toFixed(2)}`
    );
  }

  face.addEventListener('mousedown', e => {
    dragging = true; y0 = e.clientY; a0 = aCur; e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    setAngle(a0 + (y0 - e.clientY) * 0.85);
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  setAngle(0);
</script>
</body>
</html>
