<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MonoFlux</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    .chassis {
      position: relative;
      width: 1400px;
      height: 820px;
      flex-shrink: 0;
      background: url('assets/chassis-cropped.png') center center / cover no-repeat;
    }
    .reactor {
      position: absolute;
      left: 538px;
      top: 191px;
      width: 248px;
      height: 248px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 120, 30, 0.20),
        0 0 28px rgba(255, 100, 20, 0.15),
        0 0 60px rgba(255, 80, 10, 0.07);
      z-index: 10;
    }
    .reactor video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }
    .reactor::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%,
        transparent 55%,
        rgba(0, 0, 0, 0.35) 80%,
        rgba(0, 0, 0, 0.65) 100%);
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="chassis">
    <div class="reactor">
      <video id="rv" autoplay loop muted playsinline preload="auto">
        <source src="assets/reactor.webm" type="video/webm">
        <source src="assets/reactor.mp4" type="video/mp4">
      </video>
    </div>
  </div>
  <script>
    const v = document.getElementById('rv');
    function forcePlay() {
      if (v.paused) v.play().catch(() => {});
    }
    v.addEventListener('canplay', forcePlay);
    v.addEventListener('loadeddata', forcePlay);
    document.addEventListener('click', forcePlay);
    forcePlay();
  </script>
</body>
</html>
