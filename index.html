<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MonoFlux</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }

    .chassis {
      position: relative;
      width: 1400px; height: 820px;
      flex-shrink: 0;
      background: url('assets/chassis-cropped.png') center center / cover no-repeat;
    }

    /* ── Reactor ─────────────────────────── */
    .reactor {
      position: absolute;
      left: 538px; top: 191px;
      width: 248px; height: 248px;
      border-radius: 50%; overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255,120,30,.20),
        0 0 28px rgba(255,100,20,.15),
        0 0 60px rgba(255,80,10,.07);
      z-index: 10;
    }
    .reactor video { width: 100%; height: 100%; object-fit: cover; }
    .reactor::after {
      content: ''; position: absolute; inset: 0; border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, transparent 55%, rgba(0,0,0,.35) 80%, rgba(0,0,0,.65) 100%);
      pointer-events: none; z-index: 2;
    }

    /* ── Knob base ───────────────────────── */
    .k {
      position: absolute;
      width: 60px; height: 60px;
      transform: translate(-50%, -50%);
      user-select: none;
    }
    .k-ring {
      width: 60px; height: 60px;
      border-radius: 50%;
      background: repeating-conic-gradient(#1c1b1b 0deg 7deg, #111010 7deg 14deg);
      box-shadow: 0 3px 9px rgba(0,0,0,.75), 0 0 0 1px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
      display: flex; align-items: center; justify-content: center;
    }
    .k-body {
      width: 44px; height: 44px;
      border-radius: 50%;
      background:
        repeating-conic-gradient(rgba(255,255,255,.02) 0deg 5deg, transparent 5deg 10deg),
        radial-gradient(ellipse at 38% 30%, #302e2e 0%, #232121 42%, #181616 100%);
      box-shadow: inset 0 2px 5px rgba(0,0,0,.6), 0 0 0 1px rgba(40,38,38,.5);
      position: relative;
    }
    .k-line {
      position: absolute;
      width: 3px; height: 9px;
      background: rgba(210,210,210,.82);
      border-radius: 2px;
      top: 5px; left: 50%;
      transform: translateX(-50%);
    }

    /* ── Arc knob (interactive) ──────────── */
    .arc-wrap {
      position: absolute;
      width: 72px; height: 72px;
      transform: translate(-50%, -50%);
      user-select: none; cursor: ns-resize;
    }
    .arc-svg {
      position: absolute; top: 0; left: 0;
      width: 72px; height: 72px;
      pointer-events: none;
    }
    .arc-ring {
      position: absolute;
      top: 6px; left: 6px;
      width: 60px; height: 60px;
      border-radius: 50%;
      background: repeating-conic-gradient(#1c1b1b 0deg 7deg, #111010 7deg 14deg);
      box-shadow: 0 3px 9px rgba(0,0,0,.75), 0 0 0 1px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.04);
      display: flex; align-items: center; justify-content: center;
    }
    .arc-body {
      width: 44px; height: 44px;
      border-radius: 50%;
      background:
        repeating-conic-gradient(rgba(255,255,255,.02) 0deg 5deg, transparent 5deg 10deg),
        radial-gradient(ellipse at 38% 30%, #302e2e 0%, #232121 42%, #181616 100%);
      box-shadow: inset 0 2px 5px rgba(0,0,0,.6), 0 0 0 1px rgba(40,38,38,.5);
      position: relative;
      will-change: transform;
    }
    .arc-line {
      position: absolute;
      width: 3px; height: 9px;
      background: rgba(210,210,210,.82);
      border-radius: 2px;
      top: 5px; left: 50%;
      transform: translateX(-50%);
    }
  </style>
</head>
<body>
<div class="chassis">

  <!-- Reactor -->
  <div class="reactor">
    <video id="rv" autoplay loop muted playsinline preload="auto">
      <source src="assets/reactor.webm" type="video/webm">
      <source src="assets/reactor.mp4" type="video/mp4">
    </video>
  </div>

  <!-- LEFT UPPER BAY — 2×2 -->
  <div class="k" style="left:168px;top:164px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:253px;top:164px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:168px;top:249px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:253px;top:249px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>

  <!-- LEFT LOWER BAY — 2×2 -->
  <div class="k" style="left:168px;top:507px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:253px;top:507px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:168px;top:592px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:253px;top:592px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>

  <!-- RIGHT UPPER BAY — 2×2 -->
  <div class="k" style="left:1148px;top:164px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:1233px;top:164px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:1148px;top:249px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:1233px;top:249px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>

  <!-- RIGHT LOWER BAY — 2×2 -->
  <div class="k" style="left:1148px;top:507px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:1233px;top:507px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:1148px;top:592px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>
  <div class="k" style="left:1233px;top:592px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>

  <!-- BOTTOM CENTER BAY — 4 in a row -->
  <!-- K1: regular -->
  <div class="k" style="left:573px;top:649px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>

  <!-- K2: interactive arc knob (2nd from left) -->
  <div class="arc-wrap" id="arc-wrap" style="left:655px;top:649px">
    <svg class="arc-svg" viewBox="0 0 72 72">
      <!-- open-bottom track: 135° → 45° clockwise, 270° sweep, gap at bottom -->
      <path id="arc-track"
        d="M 14.79,57.21 A 30,30 0 1,1 57.21,57.21"
        fill="none" stroke="rgba(90,88,85,.55)" stroke-width="3.5" stroke-linecap="round"/>
      <!-- fill arc (current value, starts at 135°, ends at current angle) -->
      <path id="arc-fill"
        d=""
        fill="none" stroke="rgba(180,190,210,.72)" stroke-width="3.5" stroke-linecap="round"/>
    </svg>
    <div class="arc-ring">
      <div class="arc-body" id="arc-body">
        <div class="arc-line"></div>
      </div>
    </div>
  </div>

  <!-- K3: regular -->
  <div class="k" style="left:737px;top:649px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>

  <!-- K4: regular -->
  <div class="k" style="left:819px;top:649px"><div class="k-ring"><div class="k-body"><div class="k-line"></div></div></div></div>

</div>

<script>
  /* ── Video autoplay ── */
  const rv = document.getElementById('rv');
  const play = () => { if (rv.paused) rv.play().catch(() => {}); };
  rv.addEventListener('canplay', play);
  rv.addEventListener('loadeddata', play);
  play();

  /* ── Arc knob ── */
  const arcBody = document.getElementById('arc-body');
  const arcFill = document.getElementById('arc-fill');
  const R = 30, CX = 36, CY = 36;
  const START_DEG = 135; // SVG degrees, fixed arc start (lower-left)

  let isDrag = false, dragY0 = 0, angle0 = 0, angleCur = 0;

  function setAngle(deg) {
    deg = Math.max(-135, Math.min(135, deg));
    angleCur = deg;
    arcBody.style.transform = `rotate(${deg}deg)`;

    // SVG current position: 270° = up (default), shift by deg
    const curSvgDeg = 270 + deg;
    const span = curSvgDeg - START_DEG; // 0..270

    if (span < 1) { arcFill.setAttribute('d', ''); return; }

    const sx = CX + R * Math.cos(START_DEG * Math.PI / 180);
    const sy = CY + R * Math.sin(START_DEG * Math.PI / 180);
    const ex = CX + R * Math.cos(curSvgDeg * Math.PI / 180);
    const ey = CY + R * Math.sin(curSvgDeg * Math.PI / 180);
    const large = span > 180 ? 1 : 0;

    arcFill.setAttribute('d',
      `M ${sx.toFixed(2)},${sy.toFixed(2)} A ${R},${R} 0 ${large},1 ${ex.toFixed(2)},${ey.toFixed(2)}`
    );
  }

  arcBody.addEventListener('mousedown', e => {
    isDrag = true; dragY0 = e.clientY; angle0 = angleCur;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!isDrag) return;
    setAngle(angle0 + (dragY0 - e.clientY) * 0.85);
  });
  document.addEventListener('mouseup', () => { isDrag = false; });

  // Default position = 0 (indicator pointing up, half fill)
  setAngle(0);
</script>
</body>
</html>
