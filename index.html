<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MonoFlux</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    body { display: flex; align-items: center; justify-content: center; }
    .chassis {
      position: relative;
      width: 1400px;
      height: 820px;
      flex-shrink: 0;
      background: url('assets/chassis.png') center center / cover no-repeat;
    }
    .reactor {
      position: absolute;
      left: 580px;
      top: 220px;
      width: 240px;
      height: 240px;
      border-radius: 50%;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(255, 120, 30, 0.25),
        0 0 32px rgba(255, 100, 20, 0.18),
        0 0 70px rgba(255, 80, 10, 0.08);
      z-index: 10;
    }
    .reactor video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }
    .reactor::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%,
        transparent 60%,
        rgba(0, 0, 0, 0.45) 85%,
        rgba(0, 0, 0, 0.72) 100%);
      pointer-events: none;
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="chassis">
    <div class="reactor">
      <video autoplay loop muted playsinline>
        <source src="assets/reactor.mov" type="video/mp4">
        <source src="assets/reactor.mov" type="video/quicktime">
      </video>
    </div>
  </div>
</body>
</html>
